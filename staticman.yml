comments:
  allowedFields: ["name", "email", "website", "message", "replyto"]
  branch: "main"
  commitMessage: "Add comment from {fields.name}"
  filename: "{@timestamp}"
  format: "frontmatter"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601"
  moderation: true
  path: "content/comments/{options.slug}"
  requiredFields: ["name", "message"]
  transforms:
    email: "md5"
